  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tter-spacing: -0.3px; color: var(--accent);\">{{ a.rank }}<\u002Fspan>\n            <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted-2); white-space: nowrap;\">{{ a.date }}<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; line-height: 1.3; margin: 14px 0 8px; color: var(--text-strong);\">{{ a.title }}<\u002Fh3>\n          <div style=\"font-size: 14px; line-height: 1.5; color: var(--muted);\">{{ a.org }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT / FOOTER -->\n  <footer id=\"contact\" data-reveal=\"\" style=\"padding: 88px 0 72px; scroll-margin-top: 68px;\">\n    <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 40px; letter-spacing: -1px; margin-bottom: 20px; color: var(--text-strong);\">Let's talk data.<\u002Fh2>\n    <p style=\"font-size: 16px; color: var(--muted); max-width: 560px; line-height: 1.6; margin-bottom: 32px;\">Open to data analytics internships and opportunities. The fastest way to reach me is by email.<\u002Fp>\n    <div style=\"display: flex; flex-wrap: wrap; gap: 28px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 14px;\">\n      <a href=\"mailto:avayuen5@gmail.com\" style=\"color: var(--text);\">avayuen5@gmail.com<\u002Fa>\n      <a href=\"https://linkedin.com/in/avayuen5\" target=\"_blank\" rel=\"noopener\" style=\"color: var(--text);\">linkedin/in/avayuen5<\u002Fa>\n      <span style=\"color: var(--muted-2);\">(917)-981-1607<\u002Fspan>\n      <span style=\"color: var(--muted-2);\">New York, NY<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--border-soft); font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted-3);\">© 2026 Ava Yuen<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;900px&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.rootRef = React.createRef();\n  }\n\n  renderVals() {\n    const skillGroups = [\n      { name: 'Languages & Programming', items: ['SQL', 'Python', 'HTML', 'CSS', 'JavaScript'] },\n      { name: 'Analytics & BI', items: ['Tableau', 'Microsoft Excel', 'PivotTables', 'Power Query', 'XLOOKUP', 'Regression Analysis'] },\n      { name: 'AI & Tools', items: ['Claude Code', 'Generative AI Tools', 'Visual Studio Code'] },\n      { name: 'Cloud', items: ['AWS Cloud Fundamentals'] },\n    ];\n    const categories = [{ name: 'All', key: 'all' }].concat(skillGroups.map((g, i) => ({ name: g.name, key: String(i) })));\n    const allSkills = skillGroups.flatMap((g, i) => g.items.map((it) => ({ label: it, cat: String(i) })));\n    return {\n      categories: categories,\n      allSkills: allSkills,\n      rootRef: this.rootRef,\n      awards: [\n        {\n          rank: 'Top 10%',\n          date: 'January 2023',\n          title: 'National E-Commerce Website Competition',\n          org: 'Virtual Enterprise International',\n        },\n        {\n          rank: '1st Place',\n          date: 'October 2022',\n          title: 'Ads Futures Competition',\n          org: 'Virtual Enterprise International, partnered with BBDO',\n        },\n      ],\n      selectExp: (e) => this._activate(e.currentTarget.getAttribute('data-exp-index')),\n      experience: [\n        {\n          company: 'NYC Tech Talent Pipeline',\n          title: 'Data Analytics Fellow',\n          dates: 'Jun 2026 — Present',\n          bullets: [\n            'Cleaned, validated, and transformed 25+ datasets using Microsoft Excel, PivotTables, Power Query, XLOOKUP, formulas, and data validation techniques to prepare analytics-ready datasets.',\n            'Queried and analyzed datasets using SQL and exploratory data analysis (EDA) to identify trends, relationships, and key business insights.',\n            'Developed interactive dashboards and analytical reports in Tableau and Excel using statistical analysis and regression modeling to communicate findings and support data-driven decision-making.',\n          ],\n        },\n        {\n          company: 'Laith Inc',\n          title: 'Beta Tester / AI Fellow',\n          dates: 'Aug 2025 — Dec 2025',\n          bullets: [\n            'Tested a technology learning platform with 15 partner testers by completing content, assignments, and providing UX feedback to improve user experience.',\n            'Managed agile workflows as Sprint Master by organizing 5+ project-critical tasks, tracking deliverables, and coordinating team progress using Trello.',\n            'Leveraged AI productivity tools to streamline workflows, improve team efficiency, and support project execution.',\n          ],\n        },\n        {\n          company: 'Elevvo',\n          title: 'Machine Learning Intern',\n          dates: 'Aug 2025 — Sep 2025',\n          bullets: [\n            'Explored foundational machine learning concepts, including regression and introductory deep learning, through hands-on projects and exercises.',\n            'Cleaned, preprocessed, and analyzed datasets by handling missing values and preparing data for machine learning workflows.',\n            'Applied regression models to generate predictions, evaluate model performance, and visualize insights.',\n          ],\n        },\n        {\n          company: 'Bloomberg',\n          title: 'Data Extern',\n          dates: 'Aug 2025 — Aug 2025',\n          bullets: [\n            'Explored financial data quality, validation processes, and data management workflows supporting the Bloomberg Terminal.',\n            'Gained exposure to data pipelines, data modeling concepts, and enterprise data workflows through Bloomberg Terminal demonstrations and case discussions.',\n            'Collaborated with Bloomberg data professionals to learn industry best practices for data accuracy, governance, and financial data operations.',\n          ],\n        },\n      ],\n      projects: [\n        {\n          name: 'NYC Taxi Time Series Dashboard',\n          dates: '',\n          desc: 'Processed and analyzed 845,989 records from a 3.9M-row NYC Taxi dataset to evaluate revenue, trip patterns, customer behavior, and operational metrics. Built 2 interactive dashboards with 10+ visualizations, filters, and KPIs.',\n          tools: ['Tableau'],\n        },\n        {\n          name: 'AI-Assisted Exploratory Data Analysis Agent',\n          dates: '',\n          desc: 'Applied a Claude Code-based AI workflow to automate exploratory data analysis on a 6,400+ row self-selected dataset, generating insights and identifying data patterns. Evaluated AI-generated outputs to improve accuracy by 15% and reinforce human oversight.',\n          tools: ['Claude Code', 'Visual Studio Code'],\n        },\n        {\n          name: 'Apple Financial Data Analysis',\n          dates: '',\n          desc: 'Cleaned and transformed 36 quarters of Apple financial and macroeconomic data using Power Query. Built an interactive dashboard with 5+ visualizations, correlation matrices, and regression analyses to evaluate relationships between fundamentals, macro indicators, and stock performance.',\n          tools: ['Microsoft Excel', 'Power Query'],\n        },\n        {\n          name: 'Paws for Cause Website',\n          dates: 'Feb 2025 — Apr 2025',\n          desc: 'Designed and developed a responsive front-end website promoting pet adoption using HTML, CSS, and JavaScript, applying responsive web design principles. Built interactive UI components, including an RSVP system and dark mode toggle, improving usability, accessibility, and overall user experience.',\n          tools: ['Visual Studio Code', 'HTML', 'CSS', 'JavaScript'],\n        },\n        {\n          name: 'Matariki Media Website',\n          dates: 'Sep 2022 — Jun 2023',\n          desc: 'Designed and developed a company website for Matariki Media as part of the Virtual Enterprise International program. Created the website layout, visual elements, navigation structure, and branding using Wix to establish the company\\u2019s digital presence. Collaborated with team members to review and ensure website content accurately represented the company\\u2019s services, prices, and information.',\n          tools: ['Web Design', 'UI/UX Design', 'Digital Branding'],\n        },\n      ],\n      certifications: [\n        'AI Fluency: Frameworks & Foundations',\n        'Claude 101',\n        'Generative AI',\n        'Exploratory Data Analysis in SQL',\n        'Data Manipulation',\n      ],\n    };\n  }\n\n  componentDidMount() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    this._initTheme();\n\n    const reveals = Array.from(root.querySelectorAll('[data-reveal]'));\n    reveals.forEach((el) => {\n      if (prefersReduced) return;\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(18px)';\n      el.style.transition = 'opacity .7s ease, transform .7s ease';\n    });\n\n    const runCount = (el) => {\n      const target = parseFloat(el.getAttribute('data-count'));\n      const suffix = el.getAttribute('data-suffix') || '';\n      const prefix = el.getAttribute('data-prefix') || '';\n      const nocomma = el.hasAttribute('data-nocomma');\n      const fmt = (n) => nocomma ? String(n) : n.toLocaleString('en-US');\n      if (prefersReduced) { el.textContent = prefix + fmt(target) + suffix; return; }\n      const dur = 1400; const start = performance.now();\n      const step = (now) => {\n        const t = Math.min((now - start) / dur, 1);\n        const eased = 1 - Math.pow(1 - t, 3);\n        el.textContent = prefix + fmt(Math.round(target * eased)) + suffix;\n        if (t < 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    };\n\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (!entry.isIntersecting) return;\n        const el = entry.target;\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n        el.querySelectorAll && el.querySelectorAll('[data-count]').forEach(runCount);\n        io.unobserve(el);\n      });\n    }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });\n\n    reveals.forEach((el) => io.observe(el));\n    this._io = io;\n\n    this._activate('0');\n\n    root.querySelectorAll('[data-desc]').forEach((p) => {\n      const btn = p.nextElementSibling;\n      if (!btn) return;\n      btn.addEventListener('click', () => {\n        const open = btn.getAttribute('data-open') === '1';\n        if (open) { p.style.display = 'none'; btn.setAttribute('data-open', '0'); btn.textContent = 'Read more +'; }\n        else { p.style.display = 'block'; btn.setAttribute('data-open', '1'); btn.textContent = 'Read less \\u2212'; }\n      });\n    });\n\n    root.querySelectorAll('[data-skill-cat]').forEach((tab) => {\n      tab.addEventListener('click', () => this._selectCat(tab.getAttribute('data-skill-cat')));\n    });\n    this._selectCat('all');\n\n    this._wireHovers();\n  }\n\n  _selectCat(key) {\n    const root = this.rootRef.current;\n    if (!root) return;\n    root.querySelectorAll('[data-skill-cat]').forEach((tab) => {\n      const active = tab.getAttribute('data-skill-cat') === key;\n      tab.setAttribute('data-active', active ? '1' : '0');\n      tab.style.borderColor = active ? 'var(--accent)' : 'var(--border-2)';\n      tab.style.background = active ? 'var(--accent-soft)' : 'var(--surface-2)';\n      tab.style.color = active ? 'var(--accent)' : 'var(--text-2)';\n    });\n    root.querySelectorAll('[data-skill-item]').forEach((el) => {\n      el.style.display = (key === 'all' || el.getAttribute('data-cat') === key) ? '' : 'none';\n    });\n  }\n\n  _initTheme() {\n    const root = this.rootRef.current;\n    let saved = 'dark';\n    try { saved = localStorage.getItem('ava-portfolio-theme') || 'dark'; } catch (e) {}\n    this._applyTheme(saved);\n    const btn = root.querySelector('[data-theme-toggle]');\n    if (btn) {\n      btn.addEventListener('click', () => {\n        const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';\n        this._applyTheme(cur === 'light' ? 'dark' : 'light');\n      });\n      const on = () => { btn.style.borderColor = 'var(--accent)'; btn.style.color = 'var(--accent)'; };\n      const out = () => { btn.style.borderColor = 'var(--border-3)'; btn.style.color = 'var(--muted)'; };\n      btn.addEventListener('mouseover', on);\n      btn.addEventListener('mouseout', out);\n    }\n  }\n\n  _applyTheme(mode) {\n    const root = this.rootRef.current;\n    document.documentElement.setAttribute('data-theme', mode);\n    try { localStorage.setItem('ava-portfolio-theme', mode); } catch (e) {}\n    if (!root) return;\n    const icon = root.querySelector('[data-theme-icon]');\n    if (icon) {\n      const sun = '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"4\"><\u002Fline><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"22\"><\u002Fline><line x1=\"2\" y1=\"12\" x2=\"4\" y2=\"12\"><\u002Fline><line x1=\"20\" y1=\"12\" x2=\"22\" y2=\"12\"><\u002Fline><line x1=\"4.9\" y1=\"4.9\" x2=\"6.3\" y2=\"6.3\"><\u002Fline><line x1=\"17.7\" y1=\"17.7\" x2=\"19.1\" y2=\"19.1\"><\u002Fline><line x1=\"4.9\" y1=\"19.1\" x2=\"6.3\" y2=\"17.7\"><\u002Fline><line x1=\"17.7\" y1=\"6.3\" x2=\"19.1\" y2=\"4.9\"><\u002Fline><\u002Fsvg>';\n      const moon = '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z\"><\u002Fpath><\u002Fsvg>';\n      icon.innerHTML = mode === 'light' ? moon : sun;\n    }\n  }\n\n  _wireHovers() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    const on = (el, over, out) => { if (!el) return; el.addEventListener('mouseover', over); el.addEventListener('mouseout', out); };\n\n    root.querySelectorAll('nav a').forEach((a) => {\n      on(a, () => { a.style.color = 'var(--accent)'; }, () => { a.style.color = a.getAttribute('href') === '#top' ? 'var(--text-strong)' : 'var(--muted)'; });\n    });\n\n    const email = root.querySelector('[data-btn=\"email\"]');\n    on(email, () => { email.style.transform = 'translateY(-2px)'; email.style.boxShadow = '0 8px 24px rgba(91,157,255,0.35)'; }, () => { email.style.transform = ''; email.style.boxShadow = ''; });\n\n    const li = root.querySelector('[data-btn=\"linkedin\"]');\n    on(li, () => { li.style.borderColor = 'var(--accent)'; li.style.transform = 'translateY(-2px)'; }, () => { li.style.borderColor = 'var(--border-3)'; li.style.transform = ''; });\n\n    root.querySelectorAll('[data-project-card]').forEach((c) => {\n      on(c, () => { c.style.transform = 'translateY(-4px)'; c.style.boxShadow = '0 16px 40px var(--shadow-card)'; c.style.borderColor = 'var(--accent)'; }, () => { c.style.transform = ''; c.style.boxShadow = ''; c.style.borderColor = 'var(--border)'; });\n    });\n\n    root.querySelectorAll('[data-exp-index]').forEach((el) => {\n      on(el, () => { if (el.getAttribute('data-active') !== '1') el.style.background = 'var(--surface-2-hover)'; }, () => { if (el.getAttribute('data-active') !== '1') el.style.background = 'var(--surface-2)'; });\n    });\n\n    root.querySelectorAll('[data-skill-tag]').forEach((s) => {\n      on(s, () => { s.style.borderColor = 'var(--accent)'; s.style.color = 'var(--accent)'; }, () => { s.style.borderColor = 'var(--border-2)'; s.style.color = 'var(--text-2)'; });\n    });\n\n    root.querySelectorAll('[data-skill-cat]').forEach((tab) => {\n      on(tab, () => { if (tab.getAttribute('data-active') !== '1') tab.style.borderColor = 'var(--border-hover)'; }, () => { if (tab.getAttribute('data-active') !== '1') tab.style.borderColor = 'var(--border-2)'; });\n    });\n  }\n\n  _activate(idx) {\n    const root = this.rootRef.current;\n    if (!root) return;\n    idx = String(idx);\n    root.querySelectorAll('[data-exp-index]').forEach((el) => {\n      const active = el.getAttribute('data-exp-index') === idx;\n      el.setAttribute('data-active', active ? '1' : '0');\n      el.style.borderColor = active ? 'var(--accent)' : 'var(--border)';\n      el.style.borderLeftColor = active ? 'var(--accent)' : 'var(--border)';\n      el.style.background = active ? 'var(--accent-active)' : 'var(--surface-2)';\n    });\n    root.querySelectorAll('[data-exp-panel]').forEach((el) => {\n      el.style.display = el.getAttribute('data-exp-panel') === idx ? '' : 'none';\n    });\n  }\n\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
